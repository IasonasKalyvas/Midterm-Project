<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="global.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="global.js" defer></script>
    <script src="contact.js" defer></script>
     <title>Contact Form</title>
</head>
<body>

<div id="navbar-container"></div>

<div class="container py-5">
    <h1 class="text-center mb-4">Contact Us</h1>
    
    <div class="card p-4 shadow-sm mb-5">
        <form id="contactForm" novalidate>
            <div class="mb-3">
                <label class="form-label">Name <span id="nameCounter" class="text-muted small">(0/50)</span></label>
                <input type="text" id="name" class="form-control" placeholder="e.g. Jackie Chan" maxlength="50" required>
                <div class="invalid-feedback">Please enter your name (max 50 chars).</div>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" placeholder="e.g. name@example.com" required>
                <div class="invalid-feedback">Please enter a valid email (e.g. user@domain.com).</div>
            </div>

            <div class="mb-3">
                <label class="form-label">Subject</label>
                <input type="text" id="subject" class="form-control" placeholder="e.g. Delivery issue" required>
                <div class="invalid-feedback">Please enter a subject.</div>
            </div>

            <div class="mb-3">
                <label class="form-label">Message <span id="messageCounter" class="text-muted small">(0/200)</span></label>
                <textarea id="message" class="form-control" rows="4" placeholder="e.g. Explain your request here..." maxlength="200" required></textarea>
                <div class="invalid-feedback">Please enter your message (max 200 chars).</div>
            </div>

            <button type="submit" class="btn btn-primary w-100">Send Message</button>
        </form>
    </div>

    <div class="mb-5">
        <h3 class="text-center mb-3">Our Location</h3>
        <div class="map-container shadow-sm">
            <iframe 
                src="https://www.google.com/maps?q=Athens,Greece&output=embed"
                allowfullscreen=""
                loading="lazy">
            </iframe>
        </div>
    </div>

    <div class="text-center">
        <h3 class="mb-3">Follow Us</h3>
        <div class="social-icons">
            <a href="https://facebook.com" target="_blank"><i class="bi bi-facebook"></i></a>
            <a href="https://instagram.com" target="_blank"><i class="bi bi-instagram"></i></a>
            <a href="https://twitter.com" target="_blank"><i class="bi bi-twitter-x"></i></a>
            <a href="https://linkedin.com" target="_blank"><i class="bi bi-linkedin"></i></a>
        </div>
    </div>
</div>

<div id="footer-container"></div>

</body>
</html>
