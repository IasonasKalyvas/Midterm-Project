<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="tasks.css">
    <title>Tasks Management</title>
</head>
<body>

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg main-header shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
            <img src="logo.jpg" class="logo-img me-2" alt="logo">
            <span class="fw-bold fs-3">FreshTrack</span>
        </a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="menu">
            <ul class="navbar-nav nav-links align-items-lg-center">
                <li class="nav-item"><a class="nav-link" href="tasks.html">Tasks</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                <li class="nav-item"><a class="nav-link" href="report.html">Reports</a></li>
                <li class="nav-item ms-lg-3">
                    <button id="darkModeToggle" class="btn btn-outline-info" aria-label="Toggle Dark Mode">
                        <i id="darkModeIcon" class="bi bi-moon-fill fs-4"></i>
                    </button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main Body -->
<div class="container py-5">
    <h2 class="text-center mb-4">Task Management</h2>

    <!-- Search and Add Task -->
    <div class="d-flex mb-4">
        <input type="text" id="search" class="form-control me-2" placeholder="Search...">
        <select id="dept" class="form-select me-2">
            <option value="" disabled selected>Dept</option>
            <option value="Storage">Storage</option>
            <option value="Cleaning">Cleaning</option>
        </select>
        <select id="status" class="form-select me-2">
            <option value="" disabled selected>Status</option>
            <option value="complete">Complete</option>
            <option value="incomplete">Incomplete</option>
        </select>
        <select id="priority" class="form-select me-2">
            <option value="" disabled selected>Priority</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select>
        <button id="addTask" class="btn btn-success"><i class="bi bi-check-lg"></i> Add Task</button>
    </div>

    <!-- Filtering and Sorting (per date or name (alphabetically))-->
<div class="d-flex mb-4">
    <select id="filterStatus" class="form-select me-2">
        <option value="all">All Tasks</option>
        <option value="complete">Completed</option>
        <option value="incomplete">Pending</option>
    </select>

    <select id="sortOption" class="form-select">
        <option value="date">Sort by Date</option>
        <option value="name">Sort by Name</option>
    </select>
</div>

    <h3>Today's Tasks</h3>
    <div id="todayTasks" class="mb-4"></div>

    <h3>Completed Tasks</h3>
    <div id="completedTasks"></div>
</div>

<!-- Footer -->
<footer class="main-footer text-center p-4">
    <img src="logo.jpg" class="footer-logo mb-2" alt="logo">
    <p><a href="about.html" class="footer-link">About Us</a></p>
    <p class="mt-2">© 2026 FreshTrack Inc. All rights reserved.</p>
</footer>

<script src="tasks.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
